<!DOCTYPE html>
<html lang="zh-CN" class="intro-locked">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stratagem Hero</title>
    <link rel="icon" href="secret/assets/images/android-chrome-192x192.png">
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="stylesheet" href="secret/game.css">
    <style>
    /* Lock everything during intros */
    html.intro-locked,
    html.intro-locked body {
        overflow: hidden !important;
        height: 100vh;
        touch-action: none;
        overscroll-behavior: none;
    }
    /* Prevent scroll & pull-to-refresh during game */
    body.game-active {
        overflow: hidden;
        height: 100vh;
        touch-action: none;
        overscroll-behavior: none;
    }

    /* ── Drop scene ── */
    .drop-scene {
        position: fixed; inset: 0;
        z-index: 99999;
        overflow: hidden;
        pointer-events: all;
        transition: transform 0.9s cubic-bezier(0.6, 0, 0.2, 1);
    }
    .drop-scene.smashed {
        transform: translateY(-100vh);
        pointer-events: none;
    }
    canvas#dropCanvas {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
    }
    .hd2-impact-flash {
        position: fixed; inset: 0;
        z-index: 100000;
        background: #fff; opacity: 0;
        pointer-events: none;
        transition: opacity 0.1s;
    }
    .hd2-impact-flash.bang {
        animation: hd2Bang 0.8s ease-out forwards;
    }
    @keyframes hd2Bang {
        0%   { opacity: 1; background: #ffd000; }
        10%  { opacity: 0.95; background: #fff; }
        30%  { opacity: 0.5; }
        100% { opacity: 0; }
    }
    @keyframes hd2Shake {
        0%, 100% { transform: translate(0,0); }
        10% { transform: translate(-8px, 6px); }
        20% { transform: translate(10px, -8px); }
        30% { transform: translate(-6px, 4px); }
        40% { transform: translate(4px, -6px); }
        50% { transform: translate(-3px, 2px); }
        70% { transform: translate(2px, -1px); }
    }
    body.shaking { animation: hd2Shake 0.5s ease; }
    .crack-overlay {
        position: fixed; inset: 0;
        z-index: 99998;
        pointer-events: none;
        opacity: 0; transition: opacity 0.3s;
    }
    .crack-overlay.show { opacity: 1; }
    .crack-overlay.fade { opacity: 0; transition: opacity 1.5s 0.5s; }

    /* Controls — HD2 style */
    .secret-controls {
        position: fixed;
        top: 1rem;
        right: 1rem;
        z-index: 9000;
        display: flex;
        gap: 0.6rem;
    }
    .secret-controls .lang-toggle,
    .secret-controls .theme-toggle {
        width: 38px; height: 38px;
        border-radius: 0;
        border: 2px solid rgba(255, 208, 0, 0.4);
        background: rgba(10, 22, 40, 0.8);
        color: #ffd000;
        cursor: pointer;
        font-family: 'Rajdhani', sans-serif;
        font-size: 0.85rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s;
        clip-path: polygon(4px 0%, 100% 0%, calc(100% - 4px) 100%, 0% 100%);
    }
    .secret-controls .lang-toggle::before,
    .secret-controls .theme-toggle::before {
        display: none;
    }
    .secret-controls .lang-toggle:hover,
    .secret-controls .theme-toggle:hover {
        background: #ffd000;
        color: #0a1628;
    }
    </style>
</head>
<body class="game-active">

<!-- ═══ GLITCH INTRO ═══ -->
<div class="secret-glitch-overlay">
    <span class="secret-glitch-text">SYSTEM ACCESS GRANTED</span>
</div>

<!-- ═══ HELLPOD DROP CINEMATIC ═══ -->
<div class="drop-scene" id="dropScene" style="display:none;">
    <canvas id="dropCanvas"></canvas>
</div>
<div class="hd2-impact-flash" id="hd2Flash"></div>
<svg class="crack-overlay" id="crackOverlay" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
    <line x1="960" y1="540" x2="750" y2="200" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>
    <line x1="960" y1="540" x2="1200" y2="150" stroke="rgba(255,255,255,0.4)" stroke-width="2.5"/>
    <line x1="960" y1="540" x2="500" y2="450" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <line x1="960" y1="540" x2="1400" y2="380" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
    <line x1="960" y1="540" x2="860" y2="100" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <line x1="960" y1="540" x2="1100" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <line x1="960" y1="540" x2="300" y2="300" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <line x1="960" y1="540" x2="1600" y2="250" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <line x1="750" y1="200" x2="600" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <line x1="1200" y1="150" x2="1350" y2="0" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
</svg>

<!-- ═══ CONTROLS ═══ -->
<div class="secret-controls">
    <button class="lang-toggle" onclick="toggleLang()"></button>
</div>

<!-- ═══ GAME ═══ -->
<div id="game-root">
    <div id="game-title" class="game-screen active">
        <div class="title-icon">⬆⬇⬅➡</div>
        <h1 class="title-name" data-en="STRATAGEM HERO">战略配备英雄</h1>
        <p class="title-sub" data-en="Input stratagems as fast as you can!">尽可能快地输入战略配备！</p>
        <p class="title-start-hint blink" data-en="↑ ↓ ← → TO START">↑ ↓ ← → 开始游戏</p>
        <p class="title-hint" data-en="Keyboard ↑↓←→ / WASD or swipe on mobile">键盘 ↑↓←→ / WASD 或手机滑动</p>
    </div>

    <div id="game-play" class="game-screen">
        <div class="hud">
            <div class="hud-score">
                <span class="hud-label" data-en="SCORE">分数</span>
                <span id="hud-score-val">0</span>
            </div>
            <div class="hud-timer">
                <div id="timer-bar" class="timer-bar"></div>
            </div>
            <div class="hud-round">
                <span class="hud-label" data-en="ROUND">回合</span>
                <span id="hud-round-val">1</span>
            </div>
        </div>

        <div id="round-queue" class="round-queue"></div>

        <div class="strat-display">
            <div id="strat-icon" class="strat-icon">🛠</div>
            <div id="strat-name" class="strat-name">—</div>
        </div>

        <div id="arrow-sequence" class="arrow-sequence"></div>

        <div id="swipe-area" class="swipe-area">
            <span data-en="Swipe here">在此滑动</span>
        </div>

        <div id="input-feedback" class="input-feedback"></div>
    </div>

    <div id="game-over" class="game-screen">
        <h1 class="over-title" data-en="GAME OVER">游戏结束</h1>
        <div class="over-stats">
            <div class="over-stat">
                <span class="over-stat-label" data-en="Final Score">最终得分</span>
                <span id="over-score" class="over-stat-val">0</span>
            </div>
            <div class="over-stat">
                <span class="over-stat-label" data-en="Stratagems">完成配备</span>
                <span id="over-count" class="over-stat-val">0</span>
            </div>
            <div class="over-stat">
                <span class="over-stat-label" data-en="Best Streak">最佳连击</span>
                <span id="over-streak" class="over-stat-val">0</span>
            </div>
        </div>
        <button id="btn-restart" data-en="RETRY">再来一次</button>
        <a href="index.html" class="over-back" data-en="← Back to Home">← 返回主页</a>
    </div>
</div>

<script src="common.js"></script>
<script src="secret/audio.js"></script>

<!-- ═══ HELLPOD DROP ANIMATION ═══ -->
<script>
(function() {
    var glitchOverlay = document.querySelector('.secret-glitch-overlay');
    var scene = document.getElementById('dropScene');
    var cvs = document.getElementById('dropCanvas');
    var ctx = cvs.getContext('2d');
    var flash = document.getElementById('hd2Flash');
    var crack = document.getElementById('crackOverlay');
    var gameRoot = document.getElementById('game-root');

    // Hide game during intros
    gameRoot.style.display = 'none';

    // Phase 1: Glitch overlay for 1.5s, then start hellpod
    setTimeout(function() {
        if (glitchOverlay && glitchOverlay.parentNode) glitchOverlay.parentNode.removeChild(glitchOverlay);
        scene.style.display = '';
        startDrop();
    }, 1500);

    function startDrop() {
        var W, H;
        function resize() { W = cvs.width = window.innerWidth; H = cvs.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        var T = {
            beaconStart: 200, beaconLand: 800,
            beamStart: 1100, beamFull: 1800,
            podAppear: 2200, podImpact: 3600,
            slideUp: 3650, cleanup: 4800
        };

        var t0 = performance.now();
        function elapsed() { return performance.now() - t0; }

        var groundY = function() { return H * 0.78; };
        var groundProfile = [];
        for (var i = 0; i <= 60; i++) groundProfile.push(Math.random() * 8 - 4);

        var stars = [];
        for (var i = 0; i < 120; i++) {
            stars.push({ x: Math.random(), y: Math.random() * 0.75, s: Math.random() * 1.8 + 0.3, b: Math.random() * 0.7 + 0.3, tw: Math.random() * Math.PI * 2 });
        }

        var beacon = { x: 0.5, startY: -0.05, endY: 0, size: 6, landed: false, glowIntensity: 0 };
        var beam = { height: 0, maxHeight: 0, width: 4, opacity: 0, particles: [] };
        var pod = { x: 0.5, y: -0.15, targetY: 0, width: 32, height: 50, trail: [], shake: { x: 0, y: 0 } };
        var debris = [], smoke = [];

        function drawSky() {
            var grd = ctx.createLinearGradient(0, 0, 0, groundY());
            grd.addColorStop(0, '#020408');
            grd.addColorStop(0.4, '#060a14');
            grd.addColorStop(0.8, '#0a1220');
            grd.addColorStop(1, '#12181e');
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, W, groundY() + 10);
        }

        function drawStars(t) {
            for (var i = 0; i < stars.length; i++) {
                var s = stars[i];
                var twinkle = Math.sin(t * 0.002 + s.tw) * 0.3 + 0.7;
                ctx.beginPath();
                ctx.arc(s.x * W, s.y * H, s.s, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(200,210,230,' + (s.b * twinkle) + ')';
                ctx.fill();
            }
        }

        function drawGround() {
            var gy = groundY();
            ctx.beginPath();
            ctx.moveTo(0, gy);
            for (var i = 0; i <= 60; i++) ctx.lineTo((i / 60) * W, gy + groundProfile[i]);
            ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
            var grd = ctx.createLinearGradient(0, gy, 0, H);
            grd.addColorStop(0, '#2a2a28'); grd.addColorStop(0.3, '#1a1a18'); grd.addColorStop(1, '#0a0a08');
            ctx.fillStyle = grd; ctx.fill();
            ctx.beginPath(); ctx.moveTo(0, gy);
            for (var i = 0; i <= 60; i++) ctx.lineTo((i / 60) * W, gy + groundProfile[i]);
            ctx.strokeStyle = 'rgba(100,95,80,0.4)'; ctx.lineWidth = 1; ctx.stroke();
        }

        function drawBeacon(t) {
            var e = elapsed(); var bx = beacon.x * W; var gy = groundY();
            beacon.endY = gy - beacon.size;
            if (e < T.beaconStart) return;
            var by;
            if (e < T.beaconLand) {
                var p = (e - T.beaconStart) / (T.beaconLand - T.beaconStart);
                by = beacon.startY * H + (beacon.endY - beacon.startY * H) * p * p;
                ctx.beginPath(); ctx.moveTo(bx, by - 30); ctx.lineTo(bx, by);
                ctx.strokeStyle = 'rgba(255,208,0,0.3)'; ctx.lineWidth = 2; ctx.stroke();
            } else {
                by = beacon.endY; beacon.landed = true;
                var lt = e - T.beaconLand;
                beacon.glowIntensity = Math.min(1, lt / 400);
                var pulse = Math.sin(lt * 0.008) * 0.3 + 0.7;
                var ggrd = ctx.createRadialGradient(bx, gy, 0, bx, gy, 60 * beacon.glowIntensity);
                ggrd.addColorStop(0, 'rgba(255,50,0,' + (0.15 * pulse * beacon.glowIntensity) + ')');
                ggrd.addColorStop(1, 'transparent');
                ctx.fillStyle = ggrd; ctx.fillRect(bx - 80, gy - 80, 160, 100);
            }
            ctx.save(); ctx.translate(bx, by);
            ctx.beginPath(); ctx.moveTo(0, -beacon.size);
            ctx.lineTo(beacon.size * 0.6, beacon.size * 0.3);
            ctx.lineTo(-beacon.size * 0.6, beacon.size * 0.3); ctx.closePath();
            ctx.fillStyle = beacon.landed ? '#ff3300' : '#ffd000'; ctx.fill(); ctx.restore();
            if (beacon.landed && Math.sin(e * 0.01) > 0) {
                ctx.beginPath(); ctx.arc(bx, by - beacon.size + 2, 2, 0, Math.PI * 2);
                ctx.fillStyle = '#ff0000'; ctx.fill();
                ctx.beginPath(); ctx.arc(bx, by - beacon.size + 2, 6, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,0,0,0.2)'; ctx.fill();
            }
        }

        function drawBeam(t) {
            var e = elapsed(); if (e < T.beamStart) return;
            var bx = beacon.x * W; var gy = groundY(); beam.maxHeight = gy;
            if (e < T.beamFull) {
                var p = (e - T.beamStart) / (T.beamFull - T.beamStart);
                beam.height = beam.maxHeight * (1 - Math.pow(1 - p, 3));
                beam.opacity = Math.min(1, p * 2);
            } else {
                beam.height = beam.maxHeight;
                beam.opacity = 0.7 + Math.sin((e - T.beamFull) * 0.006) * 0.3;
            }
            var beamTop = gy - beam.height;
            var grd = ctx.createLinearGradient(bx, gy, bx, beamTop);
            grd.addColorStop(0, 'rgba(255,30,0,' + (beam.opacity * 0.9) + ')');
            grd.addColorStop(0.3, 'rgba(255,50,10,' + (beam.opacity * 0.7) + ')');
            grd.addColorStop(0.7, 'rgba(255,30,0,' + (beam.opacity * 0.4) + ')');
            grd.addColorStop(1, 'rgba(255,30,0,0)');
            ctx.beginPath();
            ctx.moveTo(bx - beam.width / 2, gy); ctx.lineTo(bx - beam.width * 0.3, beamTop);
            ctx.lineTo(bx + beam.width * 0.3, beamTop); ctx.lineTo(bx + beam.width / 2, gy);
            ctx.closePath(); ctx.fillStyle = grd; ctx.fill();
            var ogrd = ctx.createLinearGradient(bx, gy, bx, beamTop);
            ogrd.addColorStop(0, 'rgba(255,30,0,' + (beam.opacity * 0.15) + ')');
            ogrd.addColorStop(0.5, 'rgba(255,50,10,' + (beam.opacity * 0.06) + ')');
            ogrd.addColorStop(1, 'transparent');
            ctx.beginPath();
            ctx.moveTo(bx - 20, gy); ctx.lineTo(bx - 6, beamTop + beam.height * 0.3);
            ctx.lineTo(bx + 6, beamTop + beam.height * 0.3); ctx.lineTo(bx + 20, gy);
            ctx.closePath(); ctx.fillStyle = ogrd; ctx.fill();
            if (e > T.beamStart + 200 && Math.random() > 0.5) {
                beam.particles.push({ x: bx + (Math.random() - 0.5) * 16, y: gy, vy: -(Math.random() * 4 + 2), life: 1, size: Math.random() * 2 + 1 });
            }
            for (var i = beam.particles.length - 1; i >= 0; i--) {
                var bp = beam.particles[i]; bp.y += bp.vy; bp.life -= 0.015;
                if (bp.life <= 0 || bp.y < beamTop) { beam.particles.splice(i, 1); continue; }
                ctx.beginPath(); ctx.arc(bp.x, bp.y, bp.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,80,20,' + (bp.life * beam.opacity) + ')'; ctx.fill();
            }
        }

        function drawPod(t) {
            var e = elapsed(); if (e < T.podAppear) return;
            var bx = beacon.x * W; var gy = groundY();
            pod.x = bx; pod.targetY = gy - pod.height / 2;
            if (e < T.podImpact) {
                var p = (e - T.podAppear) / (T.podImpact - T.podAppear);
                pod.y = -pod.height + (pod.targetY + pod.height) * p * p * p;
                var shake = p * 3;
                pod.shake.x = (Math.random() - 0.5) * shake;
                pod.shake.y = (Math.random() - 0.5) * shake;
                if (pod.y > -pod.height) {
                    for (var i = 0; i < 3; i++) {
                        pod.trail.push({ x: bx + (Math.random() - 0.5) * 14, y: pod.y - pod.height / 2 + (Math.random() - 0.5) * 8, vx: (Math.random() - 0.5) * 2, vy: -(Math.random() * 2 + 1), life: 1, size: Math.random() * 4 + 2 });
                    }
                }
            } else { pod.y = pod.targetY; }
            for (var i = pod.trail.length - 1; i >= 0; i--) {
                var tp = pod.trail[i]; tp.x += tp.vx; tp.y += tp.vy; tp.life -= 0.03;
                if (tp.life <= 0) { pod.trail.splice(i, 1); continue; }
                ctx.beginPath(); ctx.arc(tp.x, tp.y, tp.size * tp.life, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,' + Math.floor(100 + 156 * tp.life) + ',' + Math.floor(50 * tp.life) + ',' + (tp.life * 0.8) + ')';
                ctx.fill();
            }
            ctx.save(); ctx.translate(pod.x + pod.shake.x, pod.y + pod.shake.y);
            if (e < T.podImpact) {
                var tgrd = ctx.createRadialGradient(0, pod.height / 2 + 10, 0, 0, pod.height / 2 + 10, 40);
                tgrd.addColorStop(0, 'rgba(255,150,30,0.6)'); tgrd.addColorStop(0.5, 'rgba(255,80,10,0.2)'); tgrd.addColorStop(1, 'transparent');
                ctx.fillStyle = tgrd; ctx.fillRect(-40, pod.height / 2 - 10, 80, 60);
            }
            var pw = pod.width / 2, ph = pod.height / 2;
            ctx.beginPath(); ctx.moveTo(0, -ph);
            ctx.lineTo(pw * 0.6, -ph + 10); ctx.lineTo(pw, -ph + 20); ctx.lineTo(pw, ph - 6);
            ctx.lineTo(pw - 4, ph); ctx.lineTo(-pw + 4, ph); ctx.lineTo(-pw, ph - 6);
            ctx.lineTo(-pw, -ph + 20); ctx.lineTo(-pw * 0.6, -ph + 10); ctx.closePath();
            ctx.fillStyle = '#3a3a3e'; ctx.fill();
            ctx.strokeStyle = '#ffd000'; ctx.lineWidth = 1.5; ctx.stroke();
            ctx.fillStyle = '#ffd000'; ctx.fillRect(-pw + 2, -5, pod.width - 4, 4);
            ctx.strokeStyle = 'rgba(255,208,0,0.4)'; ctx.lineWidth = 0.8;
            ctx.beginPath(); ctx.moveTo(-pw * 0.5, -ph + 18); ctx.lineTo(-pw * 0.5, ph - 8); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(pw * 0.5, -ph + 18); ctx.lineTo(pw * 0.5, ph - 8); ctx.stroke();
            ctx.fillStyle = '#ffd000'; ctx.beginPath();
            ctx.moveTo(0, -ph + 28); ctx.lineTo(5, -ph + 34); ctx.lineTo(0, -ph + 40); ctx.lineTo(-5, -ph + 34);
            ctx.closePath(); ctx.fill(); ctx.restore();
        }

        function drawSmoke(t) {
            var e = elapsed(); if (e < T.podImpact) return;
            var bx = beacon.x * W; var gy = groundY(); var age = e - T.podImpact;
            if (age < 600 && Math.random() > 0.3) {
                smoke.push({ x: bx + (Math.random() - 0.5) * 80, y: gy + (Math.random() - 0.5) * 10, vx: (Math.random() - 0.5) * 3, vy: -(Math.random() * 2 + 0.5), life: 1, size: Math.random() * 20 + 10 });
            }
            if (age < 100 && debris.length < 30) {
                for (var i = 0; i < 8; i++) {
                    debris.push({ x: bx + (Math.random() - 0.5) * 40, y: gy - Math.random() * 20, vx: (Math.random() - 0.5) * 12, vy: -(Math.random() * 10 + 3), life: 1, size: Math.random() * 4 + 1, gravity: 0.3 });
                }
            }
            for (var i = debris.length - 1; i >= 0; i--) {
                var d = debris[i]; d.x += d.vx; d.y += d.vy; d.vy += d.gravity; d.life -= 0.012;
                if (d.life <= 0 || d.y > H) { debris.splice(i, 1); continue; }
                ctx.beginPath(); ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(180,170,140,' + d.life + ')'; ctx.fill();
            }
            for (var i = smoke.length - 1; i >= 0; i--) {
                var s = smoke[i]; s.x += s.vx; s.y += s.vy; s.size += 0.5; s.life -= 0.008;
                if (s.life <= 0) { smoke.splice(i, 1); continue; }
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(60,55,45,' + (s.life * 0.4) + ')'; ctx.fill();
            }
        }

        function drawHUD(t) {
            var e = elapsed();
            ctx.font = '700 13px Rajdhani, sans-serif';
            if (e > 200) {
                ctx.fillStyle = 'rgba(255,208,0,' + (Math.min(1, (e - 200) / 500) * 0.6) + ')';
                ctx.fillText('SEAF \u2014 ORBITAL COMMAND', 30, 40);
            }
            if (e > T.beaconLand && e < T.podImpact) {
                ctx.fillStyle = 'rgba(255,50,0,' + (0.6 + Math.sin(e * 0.01) * 0.3) + ')';
                ctx.fillText('\u26A0 STRATAGEM BEACON ACTIVE', 30, 65);
            }
            if (e > T.podAppear && e < T.podImpact) {
                var alt = Math.max(0, 45000 - Math.floor(45000 * Math.pow((e - T.podAppear) / (T.podImpact - T.podAppear), 3)));
                ctx.fillStyle = 'rgba(255,208,0,0.7)';
                ctx.fillText('HELLPOD INBOUND \u2014 ALT: ' + alt.toLocaleString() + 'm', 30, 90);
            }
            if (e > 500) {
                ctx.fillStyle = 'rgba(255,208,0,0.25)'; ctx.font = '600 11px Rajdhani, sans-serif';
                ctx.fillText('FOR SUPER EARTH', W - 180, H - 30);
            }
        }

        var impacted = false;
        var running = true;

        function frame(t) {
            if (!running) return;
            var e = elapsed();
            ctx.clearRect(0, 0, W, H);
            drawSky(); drawStars(t); drawBeam(t); drawGround();
            drawBeacon(t); drawPod(t); drawSmoke(t); drawHUD(t);

            if (e >= T.podImpact && !impacted) {
                impacted = true;
                flash.classList.add('bang');
                document.body.classList.add('shaking');
                crack.classList.add('show');
                setTimeout(function() { document.body.classList.remove('shaking'); }, 500);
            }
            if (e >= T.slideUp && !scene.classList.contains('smashed')) {
                scene.classList.add('smashed');
                crack.classList.add('fade');
            }
            if (e >= T.cleanup) {
                running = false;
                scene.style.display = 'none';
                flash.style.display = 'none';
                crack.style.display = 'none';
                // Show game
                gameRoot.style.display = '';
                document.documentElement.classList.remove('intro-locked');
                window.scrollTo(0, 0);
                if (typeof applyLang === 'function') applyLang(localStorage.getItem('lang') || 'zh');
                return;
            }
            requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
    }
})();
</script>
